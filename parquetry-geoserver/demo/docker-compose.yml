# Parquet-in-GeoServer demo: GeoParquet, Iceberg and STAC layers in one GeoServer.
#
#   docker compose up        (or: make up)
#   open http://localhost:8080/geoserver  (admin / geoserver)
#
# Six workspaces are served on first boot, each reading through the parquetry plugin:
#   parquetry        - GeoParquet files read from local disk, baked into the image
#   parquetry-s3     - the same GeoParquet layers over S3, via the bundled s3proxy emulator
#   iceberg          - an Iceberg warehouse of tables read from local disk
#   iceberg-s3       - the same Iceberg warehouse over S3, via s3proxy (bucket "warehouse")
#   stac-json        - a static STAC catalog (JSON) on nginx; its GeoParquet assets on s3proxy
#   stac-geoparquet  - a STAC items table (GeoParquet) and its assets, both on s3proxy
#
# A future iceberg-rest workspace would pair with a catalog service here (an Iceberg REST
# catalog reading the same warehouse through a running catalog endpoint).
#
# Two helper services back the cloud-pattern and HTTP stores: s3proxy emulates S3 (serving the
# ne GeoParquet directory as bucket "naturalearth" and the Iceberg warehouse as bucket
# "warehouse"), and web (nginx) serves the stac-json catalog documents (catalog/collection/item
# JSON) over HTTP. The GeoParquet assets and the stac-geoparquet items table live on s3proxy.
#
# The s3 workspaces demonstrate the real cloud pattern: the datastores hold NO credentials;
# GeoServer reads them from the AWS default credential chain (secrets/aws mounted as ~/.aws),
# and s3proxy is configured to accept those same demo keys. The bind mounts serve the data
# directly, with no upload step.
#
# Build the image first with `make build` (compiles the plugin zip, then `docker compose build`).

services:
  s3proxy:
    image: andrewgaul/s3proxy:latest
    container_name: parquetry-s3proxy
    environment:
      S3PROXY_AUTHORIZATION: aws-v2-or-v4
      S3PROXY_IDENTITY: parquetry-demo
      S3PROXY_CREDENTIAL: parquetry-demo-secret
      S3PROXY_ENDPOINT: http://0.0.0.0:80
      JCLOUDS_PROVIDER: filesystem
      JCLOUDS_FILESYSTEM_BASEDIR: /data
    volumes:
      # The parquet directory IS the bucket "naturalearth" (bucket names must be >= 3 chars).
      - ./data/ne:/data/naturalearth:ro
      # The Iceberg warehouse IS the bucket "warehouse" (read by the iceberg-s3 workspace).
      - ./data/iceberg-warehouse:/data/warehouse:ro

  web:
    # Serves the stac-json catalog documents over HTTP: catalog.json, per-collection
    # collection.json, and the per-item JSON. The GeoParquet assets and the stac-geoparquet
    # items table live on s3proxy, not here.
    image: nginx:alpine
    container_name: parquetry-demo-web
    volumes:
      - ./data:/usr/share/nginx/html:ro

  geoserver:
    build:
      context: .
      dockerfile: Dockerfile
    image: parquetry-geoserver:demo
    container_name: parquetry-geoserver-demo
    depends_on:
      - s3proxy
      - web
    ports:
      - "8080:8080"
    environment:
      # The AWS SDK v2 default checksum headers make s3proxy return HTTP 501; relax them. These are
      # harmless against real AWS. The parquetry-s3 datastores point at the s3proxy endpoint.
      AWS_REQUEST_CHECKSUM_CALCULATION: WHEN_REQUIRED
      AWS_RESPONSE_CHECKSUM_VALIDATION: WHEN_REQUIRED
    volumes:
      # The AWS default credential chain reads ~/.aws/credentials (HOME is /root in this image).
      - ./secrets/aws:/root/.aws:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "-o", "/dev/null", "http://localhost:8080/geoserver/web/"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 40s
