name: GeoServer Demo Smoke Test

on:
  # The plugin depends transitively on parquetry-core, -format, -io and
  # -tileverse-storage; a change anywhere in the code can break the demo. Run on any
  # change except docs, rather than only on the geoserver/geotools modules.
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**.md'
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**.md'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  MAVEN_OPTS: -Dhttp.keepAlive=false -Dmaven.wagon.http.pool=false -Dmaven.wagon.http.retryHandler.class=standard -Dmaven.wagon.http.retryHandler.count=2

jobs:
  demo-smoke:
    name: Build and exercise the demo
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Skip on a merge commit: validation already ran during the PR.
    if: "github.event_name != 'push' || !contains(github.event.head_commit.message, 'Merge pull request #')"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      # Builds the plugin zip (./mvnw), builds the image (downloads GeoServer + Java 25 base),
      # and starts GeoServer + the s3proxy emulator via docker compose.
      - name: Build and start the demo
        run: make geoserver-demo

      - name: Wait for GeoServer to be healthy
        run: |
          for i in $(seq 1 72); do
            status=$(docker inspect -f '{{.State.Health.Status}}' parquetry-geoserver-demo 2>/dev/null || echo starting)
            echo "attempt $i: health=$status"
            if [ "$status" = "healthy" ]; then exit 0; fi
            sleep 5
          done
          echo "GeoServer did not become healthy in time"
          exit 1

      - name: Smoke test (REST + WFS + WMS, local and S3 workspaces)
        run: |
          set -uo pipefail
          base=http://localhost:8080/geoserver
          fail() { echo "SMOKE FAIL: $1"; exit 1; }

          # REST is up and authenticated
          code=$(curl -s -o /dev/null -w '%{http_code}' -u admin:geoserver "$base/rest/about/version.json")
          [ "$code" = "200" ] || fail "REST about/version returned HTTP $code"
          echo "REST about/version: 200"

          # WFS feature counts. parquetry reads local files; parquetry-s3 reads from the s3proxy
          # emulator via the AWS default credential chain. Both must return all 242 countries.
          for ws in parquetry parquetry-s3; do
            n=$(curl -s "$base/$ws/wfs?service=WFS&version=2.0.0&request=GetFeature&typeNames=$ws:countries&resultType=hits" \
                  | grep -oE 'numberMatched="[0-9]+"' | grep -oE '[0-9]+' || true)
            echo "$ws:countries numberMatched=${n:-<none>}"
            [ "$n" = "242" ] || fail "$ws:countries expected 242, got '${n:-<none>}'"
          done

          # WMS GetMap renders a PNG for the world layer group in each workspace
          for ws in parquetry parquetry-s3; do
            out=/tmp/$ws-world.png
            curl -s -o "$out" "$base/$ws/wms?service=WMS&version=1.1.1&request=GetMap&layers=$ws:world&bbox=-180,-90,180,90&width=400&height=200&srs=EPSG:4326&format=image/png"
            kind=$(file -b "$out")
            echo "$ws:world -> $kind"
            case "$kind" in
              "PNG image data"*) ;;
              *) fail "$ws:world did not render a PNG ($kind)";;
            esac
          done

          echo "All smoke checks passed."

      - name: Dump container logs on failure
        if: failure()
        run: docker compose -f parquetry-geoserver/demo/docker-compose.yml logs --no-color --tail 300

      - name: Tear down
        if: always()
        run: make geoserver-demo-down
