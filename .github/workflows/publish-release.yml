name: Publish Release

on:
  push:
    # Only tags that look like a release version (digit-first: 1.0-M1, 1.0.0,
    # 2.0-RC1) publish. Tags that do not start with a digit are ignored.
    tags:
      - '[0-9]*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version to publish (e.g. 1.0.0 or 1.0-M1)'
        required: true
        type: string

permissions:
  # Needed to create the GitHub Release on a tag push.
  contents: write

jobs:
  publish-release:
    name: Publish release to Maven Central
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Configure Maven settings
        uses: s4u/maven-settings-action@v3.1.0
        with:
          servers: |
            [{
              "id": "central",
              "username": "${{ secrets.CENTRAL_USERNAME }}",
              "password": "${{ secrets.CENTRAL_TOKEN }}"
            }]

      - name: Determine release version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Release version: $VERSION"

      - name: Build and test
        run: ./mvnw clean verify -Drevision=${{ steps.version.outputs.version }} -ntp

      - name: Publish release
        run: ./mvnw deploy -DskipTests -Drevision=${{ steps.version.outputs.version }} -Dgpg.skip=false -ntp
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      # The GeoServer plugin zip (drop into any GeoServer install) and the self-contained demo zip
      # are attached to the GitHub Release, not Maven Central.
      - name: Build the GeoServer plugin and demo zips
        run: make geoserver-dist MVN_FLAGS="-Drevision=${{ steps.version.outputs.version }}"

      - name: Stage release artifacts
        run: |
          version="${{ steps.version.outputs.version }}"
          target=parquetry-geoserver/target
          mkdir -p release-artifacts
          cp "$target/parquetry-geoserver-$version-plugin.zip" release-artifacts/
          cp "$target/parquetry-geoserver-demo.zip" "release-artifacts/parquetry-geoserver-demo-$version.zip"
          ls -l release-artifacts

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: release-artifacts/*
          body: |
            Published to Maven Central: https://central.sonatype.com/artifact/io.tileverse.parquetry.geoserver/parquetry-geoserver-plugin/${{ steps.version.outputs.version }}

            The GeoServer plugin and the self-contained demo are attached below.
