name: Pull Request Validation

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**.md'
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**.md'

permissions:
  contents: read

# Cancel in-progress runs for the same PR or branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  MAVEN_OPTS: -Dhttp.keepAlive=false -Dmaven.wagon.http.pool=false -Dmaven.wagon.http.retryHandler.class=standard -Dmaven.wagon.http.retryHandler.count=2

jobs:
  lint:
    name: Code Quality & Formatting
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Skip on a merge commit: validation already ran during the PR.
    if: "github.event_name == 'pull_request' || !contains(github.event.head_commit.message, 'Merge pull request #')"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Check formatting, POM sorting, and license headers
        run: make lint

  build:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: lint
    if: "github.event_name == 'pull_request' || !contains(github.event.head_commit.message, 'Merge pull request #')"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build and test with coverage
        run: ./mvnw verify -Pcoverage -ntp

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: |
            **/target/surefire-reports/
            **/target/failsafe-reports/

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: parquetry-geoserver/target/site/jacoco/

  pr-validation-complete:
    name: PR Validation Complete
    runs-on: ubuntu-latest
    needs: [lint, build]
    # Always runs to give the workflow a definite success or failure.
    if: always()

    steps:
      - name: Check job results
        run: |
          echo "Lint:  ${{ needs.lint.result }}"
          echo "Build: ${{ needs.build.result }}"

          # All skipped means a merge commit: validation already ran on the PR.
          if [[ "${{ needs.lint.result }}" == "skipped" && "${{ needs.build.result }}" == "skipped" ]]; then
            echo "Jobs skipped (merge commit) - treating as success"
            exit 0
          fi

          if [[ "${{ needs.lint.result }}" != "success" || "${{ needs.build.result }}" != "success" ]]; then
            echo "PR validation failed"
            exit 1
          fi
          echo "PR validation successful"
